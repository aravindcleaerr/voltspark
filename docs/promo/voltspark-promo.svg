<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#022c22"/>
      <stop offset="100%" style="stop-color:#064e3b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#facc15"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" rx="0"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#34d399" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Decorative energy burst -->
  <circle cx="980" cy="170" r="130" fill="url(#glow)"/>
  <circle cx="980" cy="170" r="100" fill="none" stroke="#34d399" stroke-width="2" opacity="0.15"/>
  <circle cx="980" cy="170" r="70" fill="none" stroke="#34d399" stroke-width="1.5" opacity="0.1"/>
  <circle cx="980" cy="170" r="160" fill="none" stroke="#10b981" stroke-width="1" opacity="0.08"/>

  <!-- Lightning bolt icon -->
  <g transform="translate(948, 110)">
    <polygon points="30,0 10,50 25,50 15,90 55,35 38,35 50,0" fill="url(#bolt)" opacity="0.9"/>
  </g>

  <!-- Small energy icons (decorative) -->
  <g opacity="0.08" fill="#34d399">
    <circle cx="1100" cy="350" r="30"/>
    <circle cx="1050" cy="420" r="15"/>
    <circle cx="1120" cy="450" r="20"/>
  </g>

  <!-- Top accent line -->
  <rect x="80" y="55" width="100" height="4" rx="2" fill="url(#accent)"/>

  <!-- App name -->
  <text x="80" y="125" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="58" font-weight="800" fill="#ffffff" letter-spacing="-1">
    VoltSpark
  </text>

  <!-- Tagline -->
  <text x="80" y="170" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="22" fill="#6ee7b7" font-weight="400">
    Save Energy. Stay Safe. Win Customers.
  </text>

  <!-- Main headline -->
  <text x="80" y="240" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="34" fill="#ffffff" font-weight="600">
    Energy &amp; Compliance Management
  </text>
  <text x="80" y="282" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="34" fill="#ffffff" font-weight="600">
    Platform for Indian Industry
  </text>

  <!-- Feature pills -->
  <g transform="translate(80, 315)">
    <!-- Pill 1 -->
    <rect x="0" y="0" width="240" height="38" rx="19" fill="#065f46" opacity="0.7"/>
    <text x="120" y="25" font-family="system-ui, sans-serif" font-size="14" fill="#6ee7b7" text-anchor="middle" font-weight="500">
      ZED / ISO 50001 Compliance
    </text>

    <!-- Pill 2 -->
    <rect x="255" y="0" width="220" height="38" rx="19" fill="#065f46" opacity="0.7"/>
    <text x="365" y="25" font-family="system-ui, sans-serif" font-size="14" fill="#6ee7b7" text-anchor="middle" font-weight="500">
      Utility Bill Analyzer
    </text>

    <!-- Pill 3 -->
    <rect x="490" y="0" width="220" height="38" rx="19" fill="#065f46" opacity="0.7"/>
    <text x="600" y="25" font-family="system-ui, sans-serif" font-size="14" fill="#6ee7b7" text-anchor="middle" font-weight="500">
      Savings Tracker in &#x20B9;
    </text>
  </g>

  <!-- Feature list -->
  <g transform="translate(80, 400)" font-family="system-ui, sans-serif" font-size="16" fill="#d1d5db">
    <g>
      <circle cx="8" cy="-5" r="4" fill="#34d399"/>
      <text x="22" y="0">ROI calculators — payback, NPV, IRR for energy improvements</text>
    </g>
    <g transform="translate(0, 30)">
      <circle cx="8" cy="-5" r="4" fill="#34d399"/>
      <text x="22" y="0">Safety inspections, incidents &amp; certification tracking</text>
    </g>
    <g transform="translate(0, 60)">
      <circle cx="8" cy="-5" r="4" fill="#34d399"/>
      <text x="22" y="0">Multi-tenant — consultants manage all clients from one dashboard</text>
    </g>
  </g>

  <!-- CTA banner -->
  <rect x="80" y="540" width="260" height="50" rx="25" fill="url(#accent)"/>
  <text x="210" y="572" font-family="system-ui, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="700">
    Try Demo Free
  </text>

  <!-- URL -->
  <text x="370" y="572" font-family="system-ui, sans-serif" font-size="18" fill="#9ca3af" font-weight="400">
    volt-spark.vercel.app
  </text>

  <!-- Bottom accent line -->
  <rect x="0" y="622" width="1200" height="8" fill="url(#accent)"/>

  <!-- Made in India badge -->
  <g transform="translate(1020, 540)">
    <rect x="0" y="0" width="140" height="50" rx="25" fill="#065f46" opacity="0.5" stroke="#059669" stroke-width="1"/>
    <text x="70" y="22" font-family="system-ui, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle">Made in</text>
    <text x="70" y="42" font-family="system-ui, sans-serif" font-size="16" fill="#fb923c" text-anchor="middle" font-weight="700">INDIA</text>
  </g>
</svg>
